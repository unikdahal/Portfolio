<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Unik Dahal</title>
  <script>
    // SPA redirect: encode the path into the query string so GitHub Pages
    // serves index.html, which then restores the original URL.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?/' +
      l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
